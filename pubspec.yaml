name: frontwe
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^17.0.0
  flutter_riverpod: ^2.4.3
  flutter_fortune_wheel: ^1.3.2
  flutter_dotenv: ^6.0.0
  dio: ^5.9.2
  flutter_secure_storage: ^9.0.0
  google_sign_in: ^7.2.0
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  sqflite: ^2.4.1
  path: ^1.9.0
  shimmer: ^3.0.0
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - .env
    - assets/login/google.png
    - assets/login/apple.png


